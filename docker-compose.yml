services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trackma
      POSTGRES_USER: trackma
      POSTGRES_PASSWORD: trackma_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackma -d trackma"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "health", "-m", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://trackma:trackma_pass@postgres:5432/trackma
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/apps/api/node_modules
    command: pnpm dev

  gps-ingestion:
    build:
      context: .
      dockerfile: apps/gps-ingestion/Dockerfile
    ports:
      - "3002:3002"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    depends_on:
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    volumes:
      - ./apps/gps-ingestion:/app/apps/gps-ingestion
      - ./packages:/app/packages
      - /app/apps/gps-ingestion/node_modules
    command: pnpm dev

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001
      NEXT_PUBLIC_WS_URL: ws://api:3001
    depends_on:
      - api
    volumes:
      - ./apps/web:/app/apps/web
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    command: pnpm dev

volumes:
  postgres_data:
  redis_data:
